name: Deploy gh-pages (Jekyll)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"

      - name: Bundle install
        run: bundle install --jobs 4 --retry 3
        working-directory: site

      - name: Jekyll build
        run: bundle exec jekyll build --destination ../_site_build
        working-directory: site

      - name: Disable Jekyll re-processing
        run: touch ../_site_build/.nojekyll
        working-directory: site

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _site_build
          publish_branch: gh-pages
          force_orphan: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
